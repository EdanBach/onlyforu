<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Only For You</title>

    <link rel="icon" href="https://i.postimg.cc/qvjz8QFW/Logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Playfair+Display&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="style/style.css" />
  </head>

  <body>
    <!-- LOCK SCREEN -->

    <div class="lock-screen" id="lock-screen">
      <div class="lock-content">
        <div class="lock-image">
          <img src="style/img/Anh Pass.jpg" />
        </div>

        <div class="lock-form">
          <div class="lock-icon">
            <i class="fa-solid fa-heart"></i>
          </div>

          <div class="pass-dots" id="pass-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>

          <div class="numpad">
            <button class="num-btn" data-value="1">1</button>
            <button class="num-btn" data-value="2">2</button>
            <button class="num-btn" data-value="3">3</button>

            <button class="num-btn" data-value="4">4</button>
            <button class="num-btn" data-value="5">5</button>
            <button class="num-btn" data-value="6">6</button>

            <button class="num-btn" data-value="7">7</button>
            <button class="num-btn" data-value="8">8</button>
            <button class="num-btn" data-value="9">9</button>

            <button class="num-btn blank"></button>
            <button class="num-btn" data-value="0">0</button>

            <button class="num-btn delete-btn">
              <i class="fa-solid fa-delete-left"></i>
            </button>
          </div>
        </div>
      </div>
    
    </div>

    <!-- MAIN MENU -->

    <div class="container main-content-hidden" id="main-content">
      <div class="menu">
        <button class="menu-item" id="btn-album">
          <span class="icon">
            <img src="style/img/asset/album.png" />
          </span>
          <span>Photo Album</span>
        </button>

        <button class="menu-item" id="btn-journey">
          <span class="icon">
            <img src="style/img/asset/journey.png" />
          </span>
          <span>Our Love Journey</span>
        </button>

        <button class="menu-item" id="btn-music">
          <span class="icon">
            <img src="style/img/asset/music.png" />
          </span>
          <span>Music</span>
        </button>

        <button class="menu-item" id="btn-letter">
          <span class="icon">
            <img src="style/img/asset/letter.png" />
          </span>
          <span>Letter</span>
        </button>

        <button class="menu-item" id="btn-image">
          <span class="icon">
            <img src="style/img/asset/image.png" />
          </span>
          <span>Image</span>
        </button>

        <button class="menu-item" id="btn-gift">
          <span class="icon">
            <img src="style/img/asset/gift.png" />
          </span>
          <span>Gift</span>
        </button>
      </div>
    </div>

    <!-- LETTER -->

    <div class="overlay" id="letter-overlay">
      <div class="letter-modal">
        <button class="close-btn" id="close-letter">
          <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="letter-content">
          <div class="letter-body" id="letter-body"></div>
        </div>
      </div>
    </div>

    <!-- MUSIC -->
    <div class="overlay" id="music-overlay">
      <div class="music-modal">
        <button class="close-btn" id="close-music">
          <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="spotify-player">
          <div class="player-header">
    <img src="style/img/asset/music.png" class="spotify-logo">
    <span>Music Player</span>
  </div>
          <div class="now-playing">
            <div class="album-art" id="album-art">
              <img src="" />
            </div>

            <div class="song-details">
              <h3 id="song-title">Select a song</h3>
              <p id="song-artist">Artist</p>
            </div>
          </div>

          <div class="player-controls">
            <div class="progress-container">
              <span id="current-time">0:00</span>

              <div class="progress-bar" id="progress-bar">
                <div class="progress" id="progress"></div>
              </div>

              <span id="duration">0:00</span>
            </div>

            <div class="control-buttons">
              <button class="ctrl-btn" id="prev-btn">
                <i class="fa-solid fa-backward-step"></i>
              </button>

              <button class="ctrl-btn play-pause" id="play-pause-btn">
                <i class="fa-solid fa-play"></i>
              </button>

              <button class="ctrl-btn" id="next-btn">
                <i class="fa-solid fa-forward-step"></i>
              </button>
            </div>
          </div>
          <div class="song-list" id="song-list"></div>
        </div>
      </div>
    </div>

    <!-- IMAGE GALLERY -->

    <div class="overlay" id="image-overlay">

  <div class="image-modal">

    <button class="close-btn" id="close-image">
      <i class="fa-solid fa-xmark"></i>
    </button>


    <!-- TOP TEXT + RABBIT -->
    <div class="gallery-gif-wrapper top">

      <img src="style/img/asset/meo.png" class="gallery-gif">

      <div class="flying-text text-right">
        HAPPY INTERNATIONAL WOMEN'S DAY
      </div>

    </div>


    <div class="gallery-container">

      <div class="gallery-row row-top" id="gallery-top"></div>

      <div class="gallery-row row-bottom" id="gallery-bottom"></div>
    </div>

    <!-- BOTTOM TEXT + RABBIT -->
    <div class="gallery-gif-wrapper bottom">
      <div class="flying-text text-left">
        HAPPY INTERNATIONAL WOMEN'S DAY
      </div>
      <img src="style/img/asset/meo.png" class="gallery-gif">
    </div>
  </div>
</div>

    <!-- LIGHTBOX -->

    <div class="overlay" id="lightbox-overlay">
      <div class="lightbox-content">
        <button class="close-btn" id="close-lightbox">
          <i class="fa-solid fa-xmark"></i>
        </button>

        <img id="lightbox-img" />
      </div>
    </div>

    <!-- GIFT -->

    <div class="overlay" id="gift-overlay">
      <div class="gift-modal">
        <button class="close-btn" id="close-gift">
          <i class="fa-solid fa-xmark"></i>
        </button>

        <button class="fullscreen-btn" id="fullscreen-gift">
          <i class="fa-solid fa-expand"></i>
        </button>

        <iframe src="style/gift/gift.html" class="gift-iframe"></iframe>
      </div>
    </div>

    <!--Album -->

    <div class="overlay" id="album-overlay">
      <div class="album-modal">
        <button class="close-btn" id="close-album">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <button class="fullscreen-btn" id="fullscreen-album">
          <i class="fa-solid fa-expand"></i>
        </button>
        <iframe src="style/album/index.html" class="album-iframe"> </iframe>
      </div>
    </div>

    <!--Our Love Journey-->

    <div class="overlay" id="journey-overlay">
      <div class="album-modal">
        <button class="close-btn" id="close-journey">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <button class="fullscreen-btn" id="fullscreen-journey">
          <i class="fa-solid fa-expand"></i>
        </button>
        <iframe src="style/journey/index.html" class="album-iframe"> </iframe>
      </div>
    </div>

    <audio id="audio-player"></audio>
    <audio id="pop-sound" src="style/pop.mp3"></audio>

    <button class="reset-lock-btn" id="btn-reset-lock">
      <i class="fa-solid fa-lock"></i>
    </button>
    <div id="floating-icons"></div>
    <script src="style/script.js"></script>
  </body>
</html>
